<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>بطاقة تلميذ - نظام مستر زيزو (Supabase)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- مكتبة التقاط الشاشة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a; --dark: #0f172a; --bg: #f8fafc; 
            --save-btn: #4f46e5; --danger: #be123c; --warning: #d97706; --info: #0284c7;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .top-navigation { width: 100%; max-width: 950px; background: var(--dark); padding: 10px 20px; border-radius: 10px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-title { font-size: 15px; font-weight: 900; color: #93c5fd; flex: 1; text-align: right; }
        .nav-center-sig { flex: 1; text-align: center; font-size: 16px; font-weight: 900; color: #fcd34d; }
        .nav-buttons { display: flex; gap: 15px; flex: 1; justify-content: flex-end; align-items: center; }
        
        .btn-nav { text-decoration: none; border: none; cursor: pointer; color: white; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-nav:hover { transform: translateY(-2px); }
        
        .btn-home { background: #1e3a8a !important; font-size: 16px !important; padding: 10px 20px !important; }
        .btn-home:hover { background: #172554 !important; }
        .btn-screenshot { background: silver !important; color: #111827 !important; font-size: 15px !important; padding: 10px 15px !important; }
        .btn-screenshot:hover { background: #a3a3a3 !important; }

        .form-container { background: white; padding: 25px 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 950px; border-top: 5px solid var(--primary); position: relative; }
        h2 { color: var(--dark); font-weight: 900; font-size: 20px; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 700; color: #111827; }
        
        input, select { 
            width: 100%; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            outline: none; 
            background-color: #fff; 
            padding: 10px; 
            font-size: 16px; 
            font-weight: 800; 
            text-align: center; 
        }

        input:focus, select:focus { border-color: var(--info); box-shadow: 0 0 0 2px rgba(2,132,199,0.2); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;}
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;}
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 15px;}

        .highlight-box { background: #f1f5f9; padding: 15px; border-radius: 10px; border: 2px solid var(--primary); margin-bottom: 20px; }
        .search-container { position: relative; margin-bottom: 12px; }
        #search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 0 0 8px 8px; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: var(--dark); display: flex; justify-content: space-between; }
        .result-item:hover { background-color: var(--info); color: white; }

        .readonly-field { background-color: #e2e8f0; color: var(--primary); font-weight: 800; pointer-events: none;}
        
        .actions-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-add { background-color: var(--save-btn); }
        .btn-edit { background-color: var(--warning); }
        .btn-delete { background-color: var(--danger); }
        .btn-absence { background-color: var(--dark); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 700px; border-radius: 15px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        
        .modal-header { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--danger); }
        .modal-header-titles h2 { font-size: 16px; font-weight: 900; margin: 0; color: #fcd34d; border:none; padding:0; display:flex; gap:8px;}
        .watermark-text { font-size: 12px; font-weight: 900; margin-top: 5px; opacity: 0.9; color: #fff; }
        
        .modal-body { padding: 20px; background: #fff; overflow-y:auto; max-height: 80vh; }
        
        .abs-stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .abs-card { flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; text-align: center; }
        .abs-card h4 { font-size: 13px; color: #64748b; margin-bottom: 5px; font-weight:800; }
        .abs-card h2 { font-size: 22px; font-weight: 900; direction: ltr; }
        .abs-danger { color: var(--danger); } .abs-safe { color: #16a34a; }

        .abs-list { max-height: 300px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; }
        .abs-item { display: flex; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #f1f5f9; font-weight: 800; font-size: 14px; }
        .abs-item:last-child { border: none; }
        .abs-item span:last-child { color: var(--danger); font-weight: 900; }

        #status-msg { display: none; padding: 10px; border-radius: 6px; margin-top: 10px; text-align: center; font-weight: 800; font-size: 14px; }
        
        .watermark-form { display: none; text-align: center; font-size: 13px; font-weight: 900; color: #64748b; margin-top: 15px; border-top: 2px dashed #cbd5e1; padding-top: 10px; }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } 
            .actions-bar { grid-template-columns: 1fr 1fr; } 
            .top-navigation { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-title, .nav-center-sig, .nav-buttons { text-align: center; width: 100%; justify-content: center; }
            .abs-stats { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav class="top-navigation hide-in-shot">
        <div class="nav-title"><i class="fa-solid fa-school"></i> مدرسة الشهيد أشرف حبيب</div>
        <div class="nav-center-sig">إعداد وتصميم / مستر زيزو</div>
        <div class="nav-buttons">
            <button onclick="takeScreenshot('capture-card')" class="btn-nav btn-screenshot"><i class="fa-solid fa-camera"></i> لقطة شاشة</button>
            <a href="index.html" class="btn-nav btn-home"><i class="fa-solid fa-house"></i> الرئيسية</a>
        </div>
    </nav>

    <div class="form-container" id="capture-card">
        <h2>
            <i class="fa-solid fa-id-card-clip" style="color:var(--info)"></i> بطاقة بيانات تلميذ
            <span class="watermark-form" style="display:none; border:none; padding:0; margin:0; font-size:12px; color:var(--primary)">- إعداد وتصميم / مستر زيزو</span>
        </h2>
        
        <div class="highlight-box">
            <div class="search-container">
                <label><i class="fa-solid fa-magnifying-glass"></i> اسم التلميذ رباعي (ابحث بالاسم هنا أو سجل جديد)</label>
                <input type="text" id="student_name" autocomplete="off" placeholder="اكتب أول حروف الاسم للبحث..." oninput="smartSearchByName(this.value)" style="border-color:var(--primary); font-weight:900;">
                <div id="search-results" class="hide-in-shot"></div>
            </div>
            
            <div class="grid-2" style="margin-bottom: 0;">
                <div>
                    <label>الصف الدراسي</label>
                    <select id="grade_level">
                        <option value="KG1">KG1</option><option value="KG2">KG2</option>
                        <option value="الأول">الأول</option><option value="الثاني">الثاني</option>
                        <option value="الثالث">الثالث</option><option value="الرابع">الرابع</option>
                        <option value="الخامس">الخامس</option><option value="السادس">السادس</option>
                    </select>
                </div>
                <div><label>الفصل</label><input type="text" id="class_name" placeholder="مثال: 1/2"></div>
            </div>
        </div>

        <div class="grid-3">
            <div><label>كود التلميذ (إلزامي)</label><input type="text" id="student_code" placeholder="رقم الكود..."></div>
            <div><label>الرقم القومي</label><input type="text" id="national_id" maxlength="14" oninput="extractDataFromNID()"></div>
            <div><label>رقم السجل (m)</label><input type="text" id="register_num"></div>
        </div>

        <div class="grid-3">
            <div><label>تاريخ الميلاد</label><input type="text" id="dob" class="readonly-field" readonly></div>
            <div><label>النوع</label><input type="text" id="gender" class="readonly-field" readonly></div>
            <div><label>السن في 1 أكتوبر</label><input type="text" id="age_october" class="readonly-field" readonly></div>
        </div>

        <div class="grid-4">
            <div><label>حالة القيد</label><select id="status"><option value="منقول">منقول</option><option value="باقي">باقي</option></select></div>
            <div><label>الديانة</label><select id="religion"><option value="مسلم">مسلم</option><option value="مسيحي">مسيحي</option></select></div>
            <div><label>الدمج</label><input type="text" id="dmj" placeholder="فارغ=طبيعي / دمج"></div>
            <div><label>الانتماء</label>
                <select id="transfer_type" style="background:#fffbeb; border-color:#f59e0b;">
                    <option value="أساسي">أساسي</option><option value="محول من">محول من</option><option value="محول إلى">محول إلى</option>
                </select>
            </div>
        </div>
        
        <div><label>موبايل ولي الأمر (واتساب)</label><input type="text" id="father_mobile"></div>

        <div class="actions-bar hide-in-shot">
            <button class="btn btn-add" onclick="saveNew()"><i class="fa-solid fa-floppy-disk"></i> حفظ جديد</button>
            <button class="btn btn-edit" onclick="updateExisting()"><i class="fa-solid fa-pen-to-square"></i> تعديل</button>
            <button class="btn btn-delete" onclick="safeDelete()"><i class="fa-solid fa-trash"></i> حذف</button>
            <button class="btn btn-absence" onclick="showAbsenceRecord()"><i class="fa-solid fa-calendar-xmark"></i> عرض الغياب</button>
        </div>
        
        <div class="watermark-form show-in-shot" id="card-watermark"><i class="fa-solid fa-laptop-code"></i> إعداد وتصميم / مستر زيزو</div>

        <div id="status-msg" class="hide-in-shot"></div>
    </div>

    <!-- نافذة سجل الغياب -->
    <div class="modal-overlay" id="absModal">
        <div class="modal-content" id="capture-abs">
            <div class="modal-header">
                <div class="modal-header-titles">
                    <h2><i class="fa-solid fa-clipboard-user"></i> سجل الغياب: <span id="abs-student-name"></span></h2>
                    <div class="watermark-text show-in-shot" style="display:none;"><i class="fa-solid fa-laptop-code"></i> إعداد وتصميم / مستر زيزو</div>
                </div>
                <div class="hide-in-shot" style="display: flex; gap: 15px; align-items: center;">
                    <button onclick="takeScreenshot('capture-abs')" class="btn-nav btn-screenshot" style="margin:0;"><i class="fa-solid fa-camera"></i> لقطة شاشة</button>
                    <button onclick="document.getElementById('absModal').classList.remove('active')" style="background:none; border:none; color:white; font-size:28px; cursor:pointer; line-height:1;">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="abs-stats">
                    <div class="abs-card"><h4>إجمالي الغياب</h4><h2 id="abs-total-days" style="color:var(--dark)">٠</h2></div>
                    <div class="abs-card"><h4>حضور الترم الأول</h4><h2 id="abs-term1" class="abs-safe">%٠</h2></div>
                    <div class="abs-card"><h4>حضور الترم الثاني</h4><h2 id="abs-term2" class="abs-safe">%٠</h2></div>
                </div>
                <h4 style="margin-bottom:10px; color:var(--dark); border-bottom:2px solid #eee; padding-bottom:5px; font-weight:900;">تفاصيل الأسابيع (أيام الغياب)</h4>
                <div class="abs-list" id="abs-list-container"></div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Supabase
        const supabaseUrl = 'https://xgsyktjoerrymqoutqcb.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnc3lrdGpvZXJyeW1xb3V0cWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzI2OTUsImV4cCI6MjA5OTA0ODY5NX0.fVdQnU8lQnacNzDTNXtAODbV3Jbgq5ACg5KIw0HFYLM';
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const arabicWeeks = ["الأول","الثاني","الثالث","الرابع","الخامس","السادس","السابع","الثامن","التاسع","العاشر","الحادي عشر","الثاني عشر","الثالث عشر","الرابع عشر","الخامس عشر","السادس عشر","السابع عشر","الثامن عشر","التاسع عشر","العشرون","الحادي والعشرون","الثاني والعشرون","الثالث والعشرون","الرابع والعشرون","الخامس والعشرون","السادس والعشرون","السابع والعشرون","الثامن والعشرون","التاسع والعشرون","الثلاثون"];

        let currentStudentData = null;

        function toArabicNum(num) {
            if(num === 0) return "٠";
            if(!num) return "-";
            return String(num).replace(/[0-9]/g, w => ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'][w]);
        }

        // ================= دالة التقاط الشاشة =================
        function takeScreenshot(targetId) {
            const hiddenElements = document.querySelectorAll('.hide-in-shot');
            const showElements = document.querySelectorAll('.show-in-shot');
            const targetEl = document.getElementById(targetId);
            
            let fileName = "صورة";
            if (targetId === 'capture-card') {
                let sName = document.getElementById('student_name').value.trim();
                fileName = sName ? `بطاقة_${sName}` : 'بطاقة_تلميذ';
            } else if (targetId === 'capture-abs') {
                let sName = document.getElementById('abs-student-name').innerText.trim();
                fileName = sName ? `غياب_${sName}` : 'سجل_غياب';
            }

            hiddenElements.forEach(el => el.style.display = 'none');
            showElements.forEach(el => el.style.display = 'block');

            const scrollArea = targetEl.querySelector('.abs-list');
            let origMaxHeight = "", origOverflow = "";
            if(scrollArea) {
                origMaxHeight = scrollArea.style.maxHeight;
                origOverflow = scrollArea.style.overflowY;
                scrollArea.style.maxHeight = 'none';
                scrollArea.style.overflowY = 'visible';
            }

            html2canvas(targetEl, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
                hiddenElements.forEach(el => el.style.display = ''); 
                showElements.forEach(el => el.style.display = 'none');
                if(scrollArea) {
                    scrollArea.style.maxHeight = origMaxHeight;
                    scrollArea.style.overflowY = origOverflow;
                }

                let imgData = canvas.toDataURL("image/jpeg", 0.95);
                let link = document.createElement('a');
                link.download = fileName + '.jpg';
                link.href = imgData;
                link.click();
            }).catch(err => {
                console.error(err);
                alert("حدث خطأ أثناء الالتقاط");
                location.reload(); 
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const incomingId = new URLSearchParams(window.location.search).get('id');
            if (incomingId) { fetchStudentByCode(incomingId); }
        });

        // ================= الجلب والتحديث عبر Supabase =================
      async function smartSearchByName(val) {
            const resBox = document.getElementById("search-results");
            const cleanVal = val.trim();
            if (cleanVal.length < 1) { resBox.style.display = "none"; return; }

            try {
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('code, name, grade, class')
                    .ilike('name', `${cleanVal}%`)
                    .order('name', { ascending: true }) // السطر السحري: ترتيب النتائج أبجدياً
                    .limit(20); 

                resBox.innerHTML = "";
                if (error || !data || data.length === 0) { resBox.style.display = "none"; return; }
                
                data.forEach(d => {
                    const item = document.createElement("div");
                    item.className = "result-item";
                    item.innerHTML = `<span>${d.name}</span> <small style="color:#64748b">(${d.grade}/${d.class})</small>`;
                    item.onclick = () => fetchStudentByCode(d.code);
                    resBox.appendChild(item);
                });
                resBox.style.display = "block";
            } catch (err) { console.error(err); }
        }

        async function fetchStudentByCode(code) {
            try {
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('code', code)
                    .single();
                
                if (data) populateCard(code, data);
            } catch (err) { console.error(err); }
        }

        function populateCard(code, data) {
            currentStudentData = data;
            document.getElementById("student_name").value = data.name || "";
            document.getElementById("student_code").value = code;
            document.getElementById("national_id").value = data.nid || "";
            document.getElementById("register_num").value = data.register_num || "";
            document.getElementById("grade_level").value = data.grade || "الأول";
            document.getElementById("class_name").value = data.class || "";
            document.getElementById("status").value = data.status || "منقول";
            document.getElementById("religion").value = data.religion || "مسلم";
            document.getElementById("father_mobile").value = data.father_mobile || "";
            document.getElementById("dmj").value = data.dmj || "";
            document.getElementById("transfer_type").value = data.transfer_type || "أساسي";
            
            document.getElementById("search-results").style.display = "none";
            extractDataFromNID();
            showStatus("✅ تم جلب بيانات التلميذ بنجاح", "success");
        }

        function showAbsenceRecord() {
            if(!currentStudentData) {
                alert("يرجى البحث عن تلميذ أولاً لعرض غيابه!");
                return;
            }

            document.getElementById("abs-student-name").innerText = currentStudentData.name;
            
            const abs = currentStudentData.absences || {};
            let t1Days = 0, t2Days = 0;
            let listHtml = "";

            for(let i=1; i<=30; i++) {
                const weekKey = 'W' + i;
                if(abs[weekKey] && parseInt(abs[weekKey]) > 0) {
                    const days = parseInt(abs[weekKey]);
                    if(i <= 17) t1Days += days; else t2Days += days;
                    
                    listHtml += `<div class="abs-item">
                        <span>الأسبوع ${arabicWeeks[i-1]}</span>
                        <span dir="ltr">${days} أيام</span>
                    </div>`;
                }
            }

            if(listHtml === "") {
                listHtml = `<div style="padding:20px; text-align:center; color:#16a34a; font-weight:bold;">لم يتم تسجيل أي غياب لهذا التلميذ.</div>`;
            }

            const p1 = (((85 - t1Days) / 85) * 100).toFixed(1);
            const p2 = (((65 - t2Days) / 65) * 100).toFixed(1);

            const elT1 = document.getElementById("abs-term1");
            const elT2 = document.getElementById("abs-term2");

            elT1.innerHTML = `<bdo dir="ltr">%${p1}</bdo>`;
            elT1.className = p1 < 85 ? "abs-danger" : "abs-safe";

            elT2.innerHTML = `<bdo dir="ltr">%${p2}</bdo>`;
            elT2.className = p2 < 85 ? "abs-danger" : "abs-safe";

            document.getElementById("abs-total-days").innerText = (t1Days + t2Days);
            document.getElementById("abs-list-container").innerHTML = listHtml;

            document.getElementById("absModal").classList.add("active");
        }

        function saveNew() { processSave("تم الحفظ بنجاح"); }
        function updateExisting() { if(confirm("تأكيد التعديل؟")) processSave("تم التعديل بنجاح"); }

        async function processSave(msgText) {
            const code = document.getElementById("student_code").value;
            const name = document.getElementById("student_name").value;
            if (!code || !name) { alert("الكود والاسم مطلوبان!"); return; }
            
            const dataToSave = {
                code: code, 
                name: name, 
                nid: document.getElementById("national_id").value,
                register_num: document.getElementById("register_num").value,
                dob: document.getElementById("dob").value, 
                gender: document.getElementById("gender").value,
                age_october: document.getElementById("age_october").value,
                grade: document.getElementById("grade_level").value, 
                class: document.getElementById("class_name").value,
                status: document.getElementById("status").value, 
                religion: document.getElementById("religion").value,
                father_mobile: document.getElementById("father_mobile").value, 
                dmj: document.getElementById("dmj").value, 
                transfer_type: document.getElementById("transfer_type").value
            };

            try {
                const { error } = await supabaseClient
                    .from('students')
                    .upsert(dataToSave, { onConflict: 'code' });
                
                if (error) throw error;
                
                currentStudentData = {...currentStudentData, ...dataToSave}; 
                showStatus("✅ " + msgText, "success");
            } catch (error) {
                alert("حدث خطأ أثناء الحفظ: " + error.message);
            }
        }

        async function safeDelete() {
            const code = document.getElementById("student_code").value;
            const type = document.getElementById("transfer_type").value;
            if (!code) return;
            if (type === "محول من") { alert("لا يمكن حذف (محول من) للحفاظ على الأرشيف."); return; }
            
            if (prompt("أدخل كلمة المرور للحذف:") === "2006") {
                if (confirm("حذف نهائي؟")) {
                    try {
                        const { error } = await supabaseClient
                            .from('students')
                            .delete()
                            .eq('code', code); 
                        
                        if (error) throw error;
                        
                        showStatus("🗑️ تم الحذف", "danger"); 
                        setTimeout(() => location.reload(), 1500);
                    } catch (error) {
                        alert("حدث خطأ أثناء الحذف: " + error.message);
                    }
                }
            } else { alert("كلمة مرور خاطئة"); }
        }

        function extractDataFromNID() {
            let nid = document.getElementById("national_id").value;
            if (nid.length === 14) {
                let year = (nid.charAt(0) === '3' ? '20' : '19') + nid.substring(1, 3);
                document.getElementById("dob").value = `${year}-${nid.substring(3,5)}-${nid.substring(5,7)}`;
                document.getElementById("gender").value = (parseInt(nid.charAt(12)) % 2 === 0) ? "أنثى" : "ذكر";
                calculateAgeOnOct1(year, nid.substring(3,5), nid.substring(5,7));
            }
        }

        function calculateAgeOnOct1(bYear, bMonth, bDay) {
            let targetDate = new Date("2024-10-01");
            let birthDate = new Date(`${bYear}-${bMonth}-${bDay}`);
            let years = targetDate.getFullYear() - birthDate.getFullYear();
            let months = targetDate.getMonth() - birthDate.getMonth();
            let days = targetDate.getDate() - birthDate.getDate();
            if (days < 0) { months--; days += new Date(targetDate.getFullYear(), targetDate.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }
            document.getElementById("age_october").value = `${toArabicNum(years)} سنة، ${toArabicNum(months)} شهر، ${toArabicNum(days)} يوم`;
        }

        function showStatus(text, type) {
            const msg = document.getElementById("status-msg");
            msg.style.display = "block";
            msg.style.backgroundColor = type === "success" ? "#dcfce7" : "#fee2e2";
            msg.style.color = type === "success" ? "#166534" : "#991b1b";
            msg.innerHTML = text;
        }

        document.addEventListener("click", (e) => { if (!e.target.closest(".search-container")) document.getElementById("search-results").style.display = "none"; });
    </script>
</body>
</html>
